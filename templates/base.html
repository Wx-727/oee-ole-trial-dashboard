<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stage 2 Trial Run OEE/OLE{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=103">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="{% block page_id %}{% endblock %}">
    <header class="topbar">
        <div class="topbar__brand">
            <div class="brand-logo">
                <img src="{{ url_for('static', filename='images/sats_logo.png') }}" alt="SATS" class="brand-logo__img">
            </div>
            <div>
                <h1 class="app-title">OEE and OLE Analysis</h1>
            </div>
        </div>
    </header>

    <nav class="subnav">
        <a href="{{ url_for('trial_stages') }}" class="subnav__link {% block nav_trial_stages %}{% endblock %}">OEE OLE analysis</a>
        <a href="{{ url_for('cooking_analysis') }}" class="subnav__link {% block nav_cooking %}{% endblock %}">LR Cooking Analysis</a>
        <a href="{{ url_for('production_planner') }}" class="subnav__link {% block nav_planner %}{% endblock %}">Production Planner</a>
        <a href="{{ url_for('data_page') }}" class="subnav__link {% block nav_data %}{% endblock %}">Data Upload</a>
    </nav>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <!-- AI Help Widget -->
    <div id="aiHelp" class="ai-help">
        <div class="ai-help__panel" id="aiHelpPanel" aria-hidden="true">
            <div class="ai-help__header">
                <div class="ai-help__header-info">
                    <span class="ai-help__avatar">AI</span>
                    <div>
                        <strong>Trial Data Assistant</strong>
                        <span class="ai-help__status" id="aiHelpStatus">Ready</span>
                    </div>
                </div>
                <div class="ai-help__header-actions">
                    <button class="ai-help__clear" id="aiHelpClear" aria-label="Clear conversation" title="Clear conversation">Clear</button>
                    <button class="ai-help__expand" id="aiHelpExpand" aria-label="Expand panel" title="Expand">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </button>
                    <button class="ai-help__close" id="aiHelpClose" aria-label="Close assistant">&times;</button>
                </div>
            </div>
            <div class="ai-help__messages" id="aiHelpMessages">
                <div class="ai-help__message ai-help__message--assistant">
                    <p>Hi! Ask me about the March 2026 trial run data — OEE, OLE, wastage, stage breakdowns, or any metric on this page.</p>
                </div>
            </div>
            <div class="ai-help__input-row">
                <input type="text" class="ai-help__input" id="aiHelpInput"
                    placeholder="Ask about the trial run..." autocomplete="off" />
                <button class="ai-help__send" id="aiHelpSend" aria-label="Send">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
        <button class="ai-help__fab" id="aiHelpFab" aria-label="Open AI assistant">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            AI Help
        </button>
    </div>
    <script src="{{ url_for('static', filename='js/ai_help.js') }}"></script>
</body>
</html>
